spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/webstack2?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8}
    username: ${DB_USERNAME:root}
    # 敏感信息：通过环境变量 / 启动参数注入，配置文件不保留明文
    password: ${DB_PASSWORD:a15207291068}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

# 开发环境打印 SQL，便于调试（生产环境请勿开启 StdOutImpl）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

deepseek:
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}

logging:
  level:
    root: info
    webstack: debug
